name: would-update

on:
  schedule:
    - cron: '0 18 * * *'  # 6am NZST daily (UTC+12); shifts to 7am in NZDT (UTC+13)
  workflow_dispatch:       # allow manual run

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      issue_prompt: ${{ steps.prompts.outputs.issue_prompt }}
      asset_prompt: ${{ steps.prompts.outputs.asset_prompt }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - id: prompts
        run: |
          NEWS=$(node would-read-md.js)
          echo "issue_prompt<<GS_ANZ_EOF" >> $GITHUB_OUTPUT
          printf 'You are a financial risk analyst. Based on the NZ interest rate news below, identify:\n- Any rate changes or expected changes\n- Key risks or concerns for borrowers, investors, or the economy\n- Any urgent action signals\n\nFormat your response as 3-5 short bullet points starting with a dash and space. Keep each bullet to one line. No intro sentence.\n\n' >> $GITHUB_OUTPUT
          echo "$NEWS" >> $GITHUB_OUTPUT
          echo "GS_ANZ_EOF" >> $GITHUB_OUTPUT
          echo "asset_prompt<<GS_ANZ_EOF" >> $GITHUB_OUTPUT
          printf 'You are a financial asset analyst. Based on the NZ interest rate news below, summarize:\n- Current OCR or rate level if mentioned\n- What this means for each asset class: property, bonds, equities, savings\n- Any opportunity or positioning signal\n\nFormat your response as 3-5 short bullet points starting with a dash and space. Keep each bullet to one line. No intro sentence.\n\n' >> $GITHUB_OUTPUT
          echo "$NEWS" >> $GITHUB_OUTPUT
          echo "GS_ANZ_EOF" >> $GITHUB_OUTPUT

  issue:
    needs: fetch
    uses: toiflow/-toiflow/.github/workflows/must-update-content.yml@main
    with:
      prompt: ${{ needs.fetch.outputs.issue_prompt }}
    secrets: inherit

  asset:
    needs: [fetch, issue]
    uses: toiflow/-toiflow/.github/workflows/must-update-content.yml@main
    with:
      prompt: ${{ needs.fetch.outputs.asset_prompt }}
    secrets: inherit

  update:
    needs: [issue, asset]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Update docs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_ANALYSIS: ${{ needs.issue.outputs.response }}
          ASSET_ANALYSIS: ${{ needs.asset.outputs.response }}
        run: node would-update-content.js
      - name: Update CSV log
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ASSET_ANALYSIS: ${{ needs.asset.outputs.response }}
        run: node would-update-csv.js
